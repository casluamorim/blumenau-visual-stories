<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racun — Sistema Interno</title>
    <meta name="description" content="Sistema operacional da agência Racun">
    <script>
      // SPA fallback for GitHub Pages.
      // Encodes the requested path/query into a single query string and
      // redirects to the root index.html, which restores the URL via History API.
      // See: https://github.com/rafgraph/spa-github-pages
      (function () {
        var segmentCount = 0; // 0 because we serve from the apex domain root
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
